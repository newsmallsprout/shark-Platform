# Nginx Configuration for Shark Platform

# Upstream Django server (Gunicorn running on localhost:8001)
upstream django_app {
    server 127.0.0.1:8001;
}

server {
    listen 8000;
    server_name _;

    # 默认不刷 access（健康检查/轮询/静态）；只保留 error 到 stderr
    access_log off;
    error_log /dev/stderr warn;

    # Traffic ingest POST 可能较大；默认 1m 易 413
    client_max_body_size 32m;

    # Frontend Root
    root /app/frontend/dist;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # High-frequency API（server 已 access_log off，此处保留块便于单独调 timeout）
    location = /api/system/health {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
    location ~ ^/api/traffic/ingest {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        client_max_body_size 32m;
    }
    location ~ ^/api/tasks/status {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # 1. API & Admin Proxy (match /admin and /admin/ so Django admin works)
    location ~ ^/(api|admin|auth)(/|$) {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Traffic snapshot 等可能长时间解析大量日志；默认 60s 会先断连（前端已设 120s）
        proxy_connect_timeout 15s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # 2. Django Static Files (e.g. Admin interface styles)
    # Note: frontend assets are in /app/frontend/dist/assets, served by root /
    # Django collects static files to /app/staticfiles
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 3. Frontend Assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 4. SPA Catch-all
    # Any request not matching api/admin/static/assets serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
