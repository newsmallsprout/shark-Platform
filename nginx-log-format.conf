# 由 Dockerfile 拷入 /etc/nginx/conf.d/；定义 JSON 访问日志供 observability 解析（含 host 分域、延迟）
log_format shark_json escape=json
  '{'
    '"ts":"$time_iso8601",'
    '"host":"$host",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"rt":$request_time,'
    '"urt":"$upstream_response_time"'
  '}';
