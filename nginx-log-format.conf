# 由 Dockerfile 拷入 /etc/nginx/conf.d/；定义 JSON 访问日志供 observability 解析（含 host、延迟、GeoIP 用 IP）
# GeoIP：平台从本 JSON 推导 client_ip（不要求键名 client_ip）。至少要有 remote_addr 或 XFF / X-Real-IP。
# 经多层代理时 XFF 可能为「客户端, 内网 LB…」，平台会取链上第一个公网段。
# 使用 real_ip 模块时建议增加：'"http_x_real_ip":"$remote_addr",'（重写前的直连 IP 需在 map 里另行记录时可自定义变量）
# Cloudflare 等：'"cf_connecting_ip":"$http_cf_connecting_ip",'
log_format shark_json escape=json
  '{'
    '"ts":"$time_iso8601",'
    '"host":"$host",'
    '"remote_addr":"$remote_addr",'
    '"http_x_forwarded_for":"$http_x_forwarded_for",'
    '"http_x_real_ip":"$http_x_real_ip",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"rt":$request_time,'
    '"urt":"$upstream_response_time"'
  '}';
