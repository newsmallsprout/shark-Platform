# shark-aiops — control plane (center)
# Browser SSE: set AGENT_SSE_PUBLIC_BASE to http://localhost:8010 when using UI from host.
#
# 默认栈：PostgreSQL + Redis + ClickHouse + Web + Celery + SSE
# 仅 SQLite 本地开发：不加载本文件或覆盖 web/celery 的 POSTGRES_HOST 为空（不推荐混用）。

services:
  redis:
    # Agent SSE Pub/Sub + Celery broker; async diagnosis uses ReAct (no RediSearch required on this path).
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shark}
      POSTGRES_DB: ${POSTGRES_DB:-shark}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT_PUBLISH:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shark} -d ${POSTGRES_DB:-shark}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    # 与 web/celery 的 CLICKHOUSE_* 保持一致。CH 24+ 从其他容器经 HTTP 连 default 用户通常需要非空密码。
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-shark_obs}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-shark}
    volumes:
      - ch_data:/var/lib/clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      # 本机 native 连接；与经 HTTP 从 web 容器访问的鉴权策略不同
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - shark_state:/app/state
      # 宿主机仓库根目录的 GeoLite2-City.mmdb 挂到默认读取路径（与 GEOIP_DATABASE_PATH 空值一致）
      - ${GEOIP_MMDB_HOST_FILE:-./GeoLite2-City.mmdb}:/app/state/GeoLite2-City.mmdb:ro
      - nginx_logs:/var/log/nginx
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-change-me-in-prod}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8000}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-shark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shark}
      POSTGRES_DB: ${POSTGRES_DB:-shark}
      POSTGRES_CONN_MAX_AGE: ${POSTGRES_CONN_MAX_AGE:-60}
      POSTGRES_CONNECT_TIMEOUT: ${POSTGRES_CONNECT_TIMEOUT:-10}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-8123}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-shark}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-shark_obs}
      CLICKHOUSE_STORE_RAW_EXCERPT: ${CLICKHOUSE_STORE_RAW_EXCERPT:-false}
      OBSERVABILITY_OLAP_MODE: ${OBSERVABILITY_OLAP_MODE:-analytics}
      OBSERVABILITY_MAX_EVENTS: ${OBSERVABILITY_MAX_EVENTS:-200000}
      OBSERVABILITY_LLM_TIMEOUT_SEC: ${OBSERVABILITY_LLM_TIMEOUT_SEC:-90}
      OBSERVABILITY_DISABLE_DETECTORS: ${OBSERVABILITY_DISABLE_DETECTORS:-false}
      GEOIP_DATABASE_URL: ${GEOIP_DATABASE_URL:-}
      GEOIP_DATABASE_PATH: ${GEOIP_DATABASE_PATH:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      CELERY_TIMEZONE: ${CELERY_TIMEZONE:-Asia/Shanghai}
      AGENT_EVENT_REDIS_URL: ${AGENT_EVENT_REDIS_URL:-redis://redis:6379/0}
      AGENT_SSE_PUBLIC_BASE: ${AGENT_SSE_PUBLIC_BASE:-http://localhost:8010}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-}
      SHARK_EDGE_TOKEN: ${SHARK_EDGE_TOKEN:-}
      SHARK_AI_API_KEY: ${SHARK_AI_API_KEY:-}
      SHARK_AI_PROVIDER: ${SHARK_AI_PROVIDER:-deepseek}
      SHARK_AI_API_BASE: ${SHARK_AI_API_BASE:-https://api.deepseek.com/v1}
      SHARK_AI_MODEL: ${SHARK_AI_MODEL:-deepseek-chat}
      SHARK_AI_ENABLE: ${SHARK_AI_ENABLE:-true}
      AIOPS_DEPLOYMENT_MODE: ${AIOPS_DEPLOYMENT_MODE:-}
      AIOPS_DEFAULT_PLAYBOOK_NODE: ${AIOPS_DEFAULT_PLAYBOOK_NODE:-default}
      AIOPS_AUTO_HEAL_CONFIDENCE: ${AIOPS_AUTO_HEAL_CONFIDENCE:-0.95}
      SHARK_WORK_ORDER_GATE_ENABLED: ${SHARK_WORK_ORDER_GATE_ENABLED:-false}
      SHARK_WORK_ORDER_GATE_ALLOW_SUPERUSER: ${SHARK_WORK_ORDER_GATE_ALLOW_SUPERUSER:-true}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  log-collector:
    build:
      context: ./go-log-collector
      dockerfile: Dockerfile
    profiles:
      - logs
    depends_on:
      - web
    volumes:
      - nginx_logs:/var/log/nginx:ro
    environment:
      SHARK_AIOPS_CENTER_URL: http://web:8000
      SHARK_AIOPS_EDGE_TOKEN: ${SHARK_EDGE_TOKEN:-}
      SHARK_AIOPS_LOG_SOURCE: nginx
      # 通配 access_*.json.log；可与单文件路径混用。不设 STREAM_KEY 时按文件名推导（如 access_api.json.log -> api）
      SHARK_AIOPS_LOG_PATHS: /var/log/nginx/access_*.json.log,/var/log/nginx/shark_access.log,/var/log/nginx/shark_error.log
      SHARK_AIOPS_LOG_FOLLOW: "1"
      SHARK_AIOPS_LOG_FROM_END: "1"
      SHARK_AIOPS_LOG_SEVERITY: all
      SHARK_AIOPS_STREAM_KEY: ${LOG_COLLECTOR_STREAM_KEY:-}
      SHARK_AIOPS_LOG_FORMAT: ${LOG_COLLECTOR_LOG_FORMAT:-}
    restart: unless-stopped

  celery:
    build: .
    entrypoint: []
    command: ["celery", "-A", "shark_platform", "worker", "-l", "INFO"]
    volumes:
      - shark_state:/app/state
      - ${GEOIP_MMDB_HOST_FILE:-./GeoLite2-City.mmdb}:/app/state/GeoLite2-City.mmdb:ro
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-change-me-in-prod}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-shark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shark}
      POSTGRES_DB: ${POSTGRES_DB:-shark}
      POSTGRES_CONN_MAX_AGE: ${POSTGRES_CONN_MAX_AGE:-60}
      POSTGRES_CONNECT_TIMEOUT: ${POSTGRES_CONNECT_TIMEOUT:-10}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-8123}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-shark}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-shark_obs}
      OBSERVABILITY_OLAP_MODE: ${OBSERVABILITY_OLAP_MODE:-analytics}
      OBSERVABILITY_MAX_EVENTS: ${OBSERVABILITY_MAX_EVENTS:-200000}
      OBSERVABILITY_LLM_TIMEOUT_SEC: ${OBSERVABILITY_LLM_TIMEOUT_SEC:-90}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      CELERY_TIMEZONE: ${CELERY_TIMEZONE:-Asia/Shanghai}
      AGENT_EVENT_REDIS_URL: ${AGENT_EVENT_REDIS_URL:-redis://redis:6379/0}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-}
      SHARK_AI_API_KEY: ${SHARK_AI_API_KEY:-}
      SHARK_AI_PROVIDER: ${SHARK_AI_PROVIDER:-deepseek}
      SHARK_AI_API_BASE: ${SHARK_AI_API_BASE:-https://api.deepseek.com/v1}
      SHARK_AI_MODEL: ${SHARK_AI_MODEL:-deepseek-chat}
      SHARK_AI_ENABLE: ${SHARK_AI_ENABLE:-true}
      AIOPS_DEPLOYMENT_MODE: ${AIOPS_DEPLOYMENT_MODE:-}
      AIOPS_DEFAULT_PLAYBOOK_NODE: ${AIOPS_DEFAULT_PLAYBOOK_NODE:-default}
      AIOPS_AUTO_HEAL_CONFIDENCE: ${AIOPS_AUTO_HEAL_CONFIDENCE:-0.95}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  sse:
    build: .
    entrypoint: []
    command: ["uvicorn", "sse_server:app", "--host", "0.0.0.0", "--port", "8010"]
    ports:
      - "8010:8010"
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      AGENT_EVENT_REDIS_URL: ${AGENT_EVENT_REDIS_URL:-redis://redis:6379/0}
      SSE_CORS_ORIGINS: ${SSE_CORS_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  shark_state:
  nginx_logs:
  pg_data:
  ch_data:
